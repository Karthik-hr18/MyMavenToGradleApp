apply plugin: 'java'

group = 'com.example1'
version = '1.0-SNAPSHOT'

description = """MyMavenToGradle"""

sourceCompatibility = 1.6
targetCompatibility = 1.6

repositories {
    maven { url "https://repo.maven.apache.org/maven2" }
}

dependencies {
    testImplementation 'junit:junit:3.8.1'
}

jar {
    manifest {
        attributes(
            'Main-Class': 'com.example.App'
        )
    }
}
